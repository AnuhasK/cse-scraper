name: Automated Scraper

on:
  schedule:
    - cron: '0 14 * * 1-5' # Weekdays (Mon-Fri) at 14:00 UTC (19:30 IST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scrape_all.py
        run: python scrape_all.py

      - name: Run scrape_company_details.py
        run: python scrape_company_details.py

      - name: Commit and push scraped data
        run: |
          git config user.name "AnuhasK"
          # Use an email that is VERIFIED on your GitHub account, OR use your GitHub noreply email
          git config user.email "154493387+AnuhasK@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Automated scrape: $(date +'%Y-%m-%d %H:%M:%S')"

          # Reduce push failures when another run has pushed newer commits.
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"