name: Automated Scraper

on:
  schedule:
    - cron: '0 14 * * 1-5' # Weekdays (Mon-Fri) at 14:00 UTC (19:30 IST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scrape_all.py
        run: python scrape_all.py

      - name: Run scrape_company_details.py
        run: python scrape_company_details.py

      - name: Commit and push scraped data
        run: |
          git config user.name "AnuhasK"
          # Use an email that is VERIFIED on your GitHub account, OR use your GitHub noreply email
          git config user.email "154493387+AnuhasK@users.noreply.github.com"

          git add .
          git commit -m "Automated scrape: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push